[pytest]
# Configuración de pytest para Ms-transformacion-data

# Ruta de búsqueda de pruebas
testpaths = 
    app/test
    tests

# Archivos de pruebas
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markers customizados
markers =
    asyncio: marca tests que son asincronos
    slow: marca tests que son lentos
    integration: marca tests de integración
    unit: marca tests unitarios

# Configuración asyncio
asyncio_mode = auto

# Reporte
addopts = 
    -v
    --tb=short
    --strict-markers
    -ra

# Rutas ignoradas
norecursedirs = 
    .git
    .tox
    dist
    build
    *.egg
    __pycache__
    .pytest_cache
    venv

# Console output
console_output_style = progress
